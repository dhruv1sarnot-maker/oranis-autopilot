name: oranis-perfect
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'   # safety net: every 2h in case the self-chain ever breaks
concurrency:
  group: oranis-perfect
  cancel-in-progress: false
jobs:
  perfect:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 330     # ~5.5h backstop; Claude time-boxes each chunk well under this
    steps:
      - name: Clone ai-organism (perfection branch)
        continue-on-error: true
        run: |
          git clone --depth 80 --branch oranis-perfection https://x-access-token:${{ secrets.GH_PAT }}@github.com/dhruv1sarnot-maker/ai-organism.git repo
          cd repo
          git config user.name "oranis-autopilot"
          git config user.email "dhruv1sarnot@gmail.com"
          git rev-parse HEAD > /tmp/sha_start 2>/dev/null || echo none > /tmp/sha_start
      - name: Stop if DONE
        continue-on-error: true
        id: dc
        run: |
          if [ -f repo/.oranis-autopilot/DONE ]; then echo "done=true" >> "$GITHUB_OUTPUT"; else echo "done=false" >> "$GITHUB_OUTPUT"; fi
      - name: Setup node
        continue-on-error: true
        if: steps.dc.outputs.done == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install deps + Claude Code
        continue-on-error: true
        if: steps.dc.outputs.done == 'false'
        run: |
          cd repo && (npm ci --no-audit --no-fund || npm install --no-audit --no-fund)
          npm i -g @anthropic-ai/claude-code
      - name: Run one perfection chunk (headless Claude)
        continue-on-error: true
        if: steps.dc.outputs.done == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          IS_SANDBOX: '1'
        run: |
          cd repo
          timeout 17400 claude -p "$(cat .oranis-autopilot/TASK.md)" --model claude-opus-4-8 --effort max --dangerously-skip-permissions --max-turns 2500 2>&1 | tail -120 || true
      - name: Self-review gates + auto-merge to main (continuous deploy)
        continue-on-error: true
        if: steps.dc.outputs.done == 'false'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          IS_SANDBOX: '1'
        run: |
          cd repo
          AUTH="https://x-access-token:${{ secrets.GH_PAT }}@github.com/dhruv1sarnot-maker/ai-organism.git"
          git push "$AUTH" oranis-perfection || true
          echo "=== merge gate: typecheck + schema-drift + build ==="
          GATE=1
          npm run typecheck || GATE=0
          [ "$GATE" = "1" ] && { npm run verify:schema-drift || GATE=0; }
          [ "$GATE" = "1" ] && { npm run build || GATE=0; }
          if [ "$GATE" = "1" ]; then
            echo "GATES GREEN -> merging oranis-perfection into main (auto-deploy)"
            git fetch "$AUTH" main || true
            git checkout -B main FETCH_HEAD || git checkout -B main origin/main || true
            if git merge oranis-perfection --no-edit -m "autopilot: merge verified perfection chunk -> deploy"; then
              git push "$AUTH" main && echo "MERGED + DEPLOYED" || echo "main push noop"
            else
              echo "merge conflict -> abort (next chunk resolves)"; git merge --abort || true
            fi
            git checkout oranis-perfection || true
          else
            echo "GATES RED -> NOT merging; live ORANIS untouched, next chunk fixes"
          fi
          true
      - name: Re-trigger next chunk (self-chain)
        continue-on-error: true
        if: steps.dc.outputs.done == 'false'
        run: |
          echo "maxed-out Max plan -> chain forward IMMEDIATELY, run continuously (no window pausing)"
          sleep 4
          curl -s -X POST -H "Authorization: Bearer ${{ secrets.GH_PAT }}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/dhruv1sarnot-maker/oranis-autopilot/actions/workflows/oranis-perfect.yml/dispatches" \
            -d '{"ref":"main"}' || true

name: oranis-watchdog
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
concurrency:
  group: oranis-watchdog
  cancel-in-progress: false
jobs:
  watch:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 8
    steps:
      - name: Re-kick engine if the chain has stalled
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set +e
          AIORG="https://api.github.com/repos/dhruv1sarnot-maker/ai-organism"
          ENG="https://api.github.com/repos/dhruv1sarnot-maker/oranis-autopilot/actions/workflows/oranis-perfect.yml"
          DONE=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $GH_PAT" "$AIORG/contents/.oranis-autopilot/DONE?ref=oranis-perfection")
          if [ "$DONE" = "200" ]; then echo "engine DONE — standing down"; exit 0; fi
          ACTIVE=$(curl -s -H "Authorization: Bearer $GH_PAT" "$ENG/runs?per_page=20&status=in_progress" | python3 -c 'import sys,json;print(len(json.load(sys.stdin).get("workflow_runs",[])))')
          QUEUED=$(curl -s -H "Authorization: Bearer $GH_PAT" "$ENG/runs?per_page=20&status=queued"      | python3 -c 'import sys,json;print(len(json.load(sys.stdin).get("workflow_runs",[])))')
          echo "active=$ACTIVE queued=$QUEUED"
          if [ "${ACTIVE:-0}" -gt 0 ] || [ "${QUEUED:-0}" -gt 0 ]; then echo "engine alive — healthy"; exit 0; fi
          echo "engine idle + not DONE -> re-kicking the chain"
          curl -s -X POST -H "Authorization: Bearer $GH_PAT" -H "Accept: application/vnd.github+json" "$ENG/dispatches" -d '{"ref":"main"}'
          exit 0
